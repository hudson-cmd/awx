---
- name: Reparar tabelas MyISAM
  hosts: all
  become: yes
  gather_facts: no
  ignore_unreachable: yes

  tasks:
    - name: Executar reparo das tabelas MyISAM
      ansible.builtin.shell: |
        myisamchk -r /var/lib/mysql/*/*.MYI
      register: repair
      failed_when: false

    - name: Reiniciar o MariaDB
      ansible.builtin.systemd:
        name: mariadb
        state: restarted

    - name: Verificar se ainda existem tabelas com problema
      ansible.builtin.shell: |
        myisamchk -s /var/lib/mysql/*/*.MYI
      register: check
      failed_when: false
      changed_when: false

    - name: Exibir resultado
      ansible.builtin.debug:
        msg: >-
          {% if check.stdout | trim == '' %}
          Nenhuma tabela crashada encontrada.
          {% else %}
          {{ check.stdout }}
          {% endif %}
