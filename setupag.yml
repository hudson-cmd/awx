---
- name: Bootstrap + Configuração base
  hosts: all
  become: true
  gather_facts: false

  tasks:

    - name: Instalar Python (bootstrap)
      raw: dnf install -y python3
      changed_when: false

    - name: Coletar facts após Python
      setup:

    - name: Instalar repositório EPEL
      yum:
        name: epel-release
        state: present

    - name: Instalar pacotes básicos
      yum:
        name:
          - open-vm-tools
          - vim
          - htop
          - wget
          - tcpdump
          - net-tools
          - lsof
        state: present

    - name: Criar diretório para sngrep
      file:
        path: /tmp/sngrep
        state: directory
        mode: '0755'

    - name: Baixar pacote sngrep
      get_url:
        url: http://repo.iotti.biz/CentOS/8/x86_64/sngrep-1.7.0-0.el8.lux.x86_64.rpm
        dest: /tmp/sngrep/sngrep.rpm
        mode: '0644'

    - name: Instalar sngrep
      yum:
        name: /tmp/sngrep/sngrep.rpm
        state: present
        disable_gpg_check: true

    - name: Remover RPM do sngrep
      file:
        path: /tmp/sngrep/sngrep.rpm
        state: absent

    - name: Criar MOTD
      copy:
        dest: /etc/profile.d/motd.sh
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/bin/bash

          [[ -n "$MOTD_SHOWN" ]] && return
          export MOTD_SHOWN=1

          if [[ "$USER" == "suporte" || "$USER" == "root" ]]; then
              echo "===================================="
              echo " 🖥️ Servidor: $(hostname)"
              echo " 📅 Data: $(date)"
              echo " ⏳ Uptime: $(uptime -p)"
              echo " 📊 Usuários logados: $(who | wc -l)"
              echo " 🌐 Espaço livre: $(df -h / | tail -1 | awk '{print $4}')"
              echo "===================================="
          fi

    - name: Rebootar servidor
      reboot:
        msg: "Reboot automático via AWX"
        reboot_timeout: 600
        pre_reboot_delay: 5
        post_reboot_delay: 20
        test_command: whoami
