---
- name: Configurar MOTD e pacotes básicos
  hosts: all
  become: true

  tasks:

    - name: Instalar repositório EPEL
      yum:
        name: epel-release
        state: present

    - name: Instalar pacotes necessários
      yum:
        name:
          - open-vm-tools
          - vim
          - htop
          - wget
        state: present

    - name: Criar diretório para o sngrep
      file:
        path: /tmp/sngrep
        state: directory
        mode: '0755'

    - name: Baixar o pacote sngrep
      get_url:
        url: http://repo.iotti.biz/CentOS/8/x86_64/sngrep-1.7.0-0.el8.lux.x86_64.rpm
        dest: /tmp/sngrep/sngrep-1.7.0-0.el8.lux.x86_64.rpm
        mode: '0644'

    - name: Instalar sngrep
      yum:
        name: /tmp/sngrep/sngrep-1.7.0-0.el8.lux.x86_64.rpm
        state: present

    - name: Criar MOTD simples em /etc/profile.d/motd.sh
      copy:
        dest: /etc/profile.d/motd.sh
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/bin/bash

          [[ -n "$MOTD_SHOWN" ]] && return
          export MOTD_SHOWN=1

          if [[ "$USER" == "suporte" || "$USER" == "root" ]]; then
              echo "===================================="
              echo " 🖥️ Servidor: $(hostname)"
              echo " 📅 Data: $(date)"
              echo " ⏳ Uptime: $(uptime -p)"
              echo " 📊 Usuários logados: $(who | wc -l)"
              echo " 🌐 Espaço livre no disco: $(df -h / | tail -1 | awk '{print $4}')"
              echo "===================================="
          fi

    - name: Rebootar o servidor
      reboot:
        msg: "Reboot automático via AWX após configuração"
        reboot_timeout: 600
        pre_reboot_delay: 5
        post_reboot_delay: 20
        test_command: whoami
